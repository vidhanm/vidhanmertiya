<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Vidhan Mertiya</title>
  <meta name="description" content="Thoughts on web development, design, and building in public">
  <link rel="stylesheet" href="/styles/globals.css">
</head>
<body>
  <main class="relative min-h-screen overflow-hidden bg-white text-black">
    <div class="relative mx-auto grid min-h-screen max-w-[1600px] lg:grid-cols-[420px_minmax(0,1fr)]">
      <aside class="border-b-[4px] border-black bg-white px-6 py-10 lg:sticky lg:top-0 lg:h-screen lg:border-b-0 lg:border-r-[4px] lg:px-10">
        <div class="flex h-full flex-col gap-8 pt-2">
          <div class="flex flex-col gap-4">
            <a href="/" class="inline-flex items-center gap-2 border-[2px] border-black bg-white px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-black transition-all hover:bg-black hover:text-white w-fit">
              ← Back
            </a>

            <h1 class="font-heading text-3xl font-black leading-[0.9] text-black sm:text-4xl">
              Blog
            </h1>

            <p class="text-sm text-gray-600">
              Thoughts on web development, design, and building in public.
            </p>
          </div>

          <nav class="flex flex-col gap-2 border-t-[3px] border-black pt-6">
            <a href="/" class="border-[2px] border-black bg-white px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-black transition-all hover:bg-black hover:text-white">
              Projects
            </a>
            <a href="/blog" class="border-[2px] border-black bg-black px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-white transition-all hover:bg-white hover:text-black">
              Blog
            </a>
          </nav>
        </div>
      </aside>

      <section class="px-4 py-8 sm:px-6 lg:px-10 lg:py-12">
        <div class="space-y-4" id="blog-posts">
          <!-- Blog posts will be inserted here via JS -->
        </div>
      </section>
    </div>
  </main>

  <script>
    fetch('/data/blog-posts.json')
      .then(res => res.json())
      .then(posts => {
        const container = document.getElementById('blog-posts');
        posts.forEach(post => {
          const tagsHtml = post.tags.map(tag => 
            `<span class="border-[1px] border-gray-300 bg-gray-50 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-700">${tag}</span>`
          ).join('');

          container.innerHTML += `
            <article class="border-[3px] border-black bg-white p-6 shadow-[6px_6px_0px_rgba(0,0,0,0.1)] transition-all hover:shadow-[10px_10px_0px_rgba(0,0,0,0.15)]">
              <div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-start">
                <div class="flex-1">
                  <h2 class="text-xl font-bold text-black">
                    <a href="/blog/${post.slug}" class="hover:underline">${post.title}</a>
                  </h2>
                  <p class="mt-2 text-sm text-gray-600">${post.excerpt}</p>

                  <div class="mt-4 flex flex-wrap gap-2">
                    ${tagsHtml}
                  </div>
                </div>

                <div class="flex flex-col items-start gap-1 sm:items-end sm:text-right">
                  <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-gray-500">
                    ${post.date}
                  </p>
                  <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-gray-500">
                    ${post.readTime}
                  </p>
                </div>
              </div>
            </article>
          `;
        });
      })
      .catch(err => {
        console.error('Error loading blog posts:', err);
        document.getElementById('blog-posts').innerHTML = '<p>Error loading blog posts</p>';
      });
  </script>
</body>
</html>
