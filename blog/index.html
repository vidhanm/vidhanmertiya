<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Vidhan Mertiya</title>
  <meta name="description" content="Thoughts on web development, design, and building in public">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Sticky top navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: white;
      border-bottom: 4px solid black;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .navbar-avatar {
      width: 50px;
      height: 50px;
      border-radius: 0.5rem;
      border: 2px solid black;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
      font-weight: bold;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
    }

    .navbar-brand {
      font-size: 0.9rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .navbar-center {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex: 1;
    }

    .navbar-nav {
      display: flex;
      border: 2px solid black;
      background: white;
    }

    .navbar-nav a {
      padding: 0.5rem 1rem;
      border-right: 2px solid black;
      font-size: 0.75rem;
      font-weight: 600;
      uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: black;
      text-decoration: none;
    }

    .navbar-nav a:last-child {
      border-right: none;
    }

    .navbar-nav a.active {
      background: black;
      color: white;
    }

    .navbar-nav a:hover:not(.active) {
      background: #f5f5f5;
    }

    .navbar-right {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .navbar-social {
      width: 40px;
      height: 40px;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      color: black;
      text-decoration: none;
    }

    .navbar-social:hover {
      background: black;
      color: white;
      transform: translateY(-2px);
    }

    /* Blog section */
    .blog-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .blog-header {
      margin-bottom: 3rem;
    }

    .blog-title {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .blog-subtitle {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
    }

    .blog-posts {
      space-y: 1.5rem;
    }

    .blog-card {
      border: 3px solid black;
      background: white;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.15);
      transition: all 0.2s;
    }

    .blog-card:hover {
      box-shadow: 12px 12px 0 rgba(0,0,0,0.2);
      transform: translateY(-4px);
    }

    .blog-post-title {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }

    .blog-post-title a {
      color: black;
      text-decoration: none;
    }

    .blog-post-title a:hover {
      text-decoration: underline;
    }

    .blog-excerpt {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .blog-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .blog-tag {
      border: 1px solid #ddd;
      background: #f9f9f9;
      padding: 0.35rem 0.85rem;
      font-size: 0.7rem;
      font-weight: 600;
      uppercase;
      letter-spacing: 0.05em;
      color: #666;
    }

    .blog-meta {
      display: flex;
      gap: 2rem;
      font-size: 0.8rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .blog-card-footer {
      border-top: 2px solid black;
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media (max-width: 1024px) {
      .navbar {
        flex-wrap: wrap;
        padding: 1rem;
      }

      .navbar-center {
        order: 3;
        width: 100%;
        margin-top: 0.75rem;
      }

      .navbar-brand {
        display: none;
      }

      .blog-title {
        font-size: 1.75rem;
      }

      .blog-card {
        padding: 1.5rem;
      }

      .blog-post-title {
        font-size: 1.25rem;
      }
    }

    @media (max-width: 640px) {
      .navbar {
        padding: 0.75rem;
      }

      .navbar-nav a {
        padding: 0.4rem 0.7rem;
        font-size: 0.65rem;
      }

      .blog-section {
        padding: 1.5rem 1rem;
      }

      .blog-title {
        font-size: 1.5rem;
      }

      .blog-card {
        padding: 1rem;
      }

      .blog-post-title {
        font-size: 1rem;
      }

      .blog-meta {
        flex-direction: column;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="relative min-h-screen overflow-hidden bg-white text-black">
    <!-- STICKY TOP NAVBAR (Pattern 1) -->
    <nav class="navbar">
      <!-- Left: Avatar + Brand -->
      <div class="navbar-left">
        <div class="navbar-avatar overflow-hidden">
          <img src="/public/profile.jpg" alt="Vidhan Mertiya" class="w-full h-full object-cover">
        </div>
        <div class="navbar-brand">Vidhan<br>Mertiya</div>
      </div>

      <!-- Center: Navigation Tabs -->
      <div class="navbar-center">
        <div class="navbar-nav">
          <a href="/">Projects</a>
          <a href="/blog" class="active">Blog</a>
        </div>
      </div>

      <!-- Right: Social Icons -->
      <div class="navbar-right">
        <a href="https://github.com/vidhanm" target="_blank" rel="noopener noreferrer" class="navbar-social" aria-label="GitHub">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
        <a href="https://linkedin.com/in/vidhanmertiya" target="_blank" rel="noopener noreferrer" class="navbar-social" aria-label="LinkedIn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.469v6.766z"/></svg>
        </a>
        <a href="https://x.com/vidhanmertiya" target="_blank" rel="noopener noreferrer" class="navbar-social" aria-label="X">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="mailto:vidhanmertiya.vm@gmail.com" class="navbar-social" aria-label="Email">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </a>
      </div>
    </nav>

    <!-- BLOG SECTION -->
    <section class="blog-section">
      <div class="blog-header">
        <h1 class="blog-title">Blog</h1>
        <p class="blog-subtitle">Thoughts on web development, design, and building in public.</p>
      </div>

      <div class="blog-posts" id="blog-posts">
        <!-- Blog posts will be inserted here via JS -->
      </div>
    </section>
  </main>

  <script>
    fetch('/blog-index.json')
      .then(res => res.json())
      .then(posts => {
        const container = document.getElementById('blog-posts');
        posts.forEach(post => {
          const tagsHtml = post.tags.map(tag => 
            `<span class="blog-tag">${tag}</span>`
          ).join('');

          container.innerHTML += `
            <article class="blog-card">
              <div class="blog-post-title">
                <a href="/blog/${post.slug}/">${post.title}</a>
              </div>
              <p class="blog-excerpt">${post.excerpt}</p>
              
              <div class="blog-tags">
                ${tagsHtml}
              </div>

              <div class="blog-card-footer">
                <div class="blog-meta">
                  <span>${post.date}</span>
                  <span>${post.readTime}</span>
                </div>
                <a href="/blog/${post.slug}/" class="text-xs font-semibold uppercase tracking-[0.1em] text-black border-b-2 border-black pb-0.5 hover:border-none">Read More →</a>
              </div>
            </article>
          `;
        });
      })
      .catch(err => {
        console.error('Error loading blog posts:', err);
        document.getElementById('blog-posts').innerHTML = '<p>Error loading blog posts</p>';
      });
  </script>
</body>
</html>
