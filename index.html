                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
              </a>
              <a href="https://linkedin.com/in/vidhanmertiya" target="_blank" rel="noopener noreferrer" class="inline-flex h-11 w-11 items-center justify-center border-[3px] border-black bg-white transition-all hover:bg-black hover:text-white" aria-label="LinkedIn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.469v6.766z"/></svg>
              </a>
              <a href="https://x.com/vidhanmertiya" target="_blank" rel="noopener noreferrer" class="inline-flex h-11 w-11 items-center justify-center border-[3px] border-black bg-white transition-all hover:bg-black hover:text-white" aria-label="X (Twitter)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </a>
              <a href="mailto:vidhanmertiya.vm@gmail.com" class="inline-flex h-11 w-11 items-center justify-center border-[3px] border-black bg-white transition-all hover:bg-black hover:text-white" aria-label="Email">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </a>
            </div>

            <nav class="flex flex-col gap-2 border-t-[3px] border-black pt-6 w-full">
              <a href="/" class="border-[2px] border-black bg-black px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-white transition-all hover:bg-white hover:text-black">
                Projects
              </a>
              <a href="/blog" class="border-[2px] border-black bg-white px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-black transition-all hover:bg-black hover:text-white">
                Blog
              </a>
            </nav>
          </div>
        </div>
      </aside>

      <section class="px-4 py-8 sm:px-6 lg:px-10 lg:py-12">
        <div class="grid gap-5 md:grid-cols-2" id="projects-grid">
          <!-- Projects will be inserted here via JS -->
        </div>

        <div class="mt-10 border-[3px] border-black bg-white p-6 shadow-[8px_8px_0px_rgba(0,0,0,0.2)]">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.3em] text-black">Portfolio mix</p>
              <h4 class="mt-2 text-lg font-semibold text-black">Live apps, repos, and fresh experiments</h4>
            </div>
            <span class="border-[2px] border-black bg-black px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-white" id="project-count">
              10 projects
            </span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const projects = [
      {
        name: "TalkBook",
        href: "https://talkbook.live/",
        description: "A conversational product landing page with a polished real-world feel.",
        tag: "Commercial",
        previewType: "iframe",
        links: [{label: "Live", href: "https://talkbook.live/"}],
        tech: ["Landing Page", "Product", "Messaging"]
      },
      {
        name: "JobSpy",
        href: "/jobspy-preview.mp4",
        description: "A comprehensive web application to list and search for jobs across all major employment websites.",
        tag: "Video",
        previewType: "video",
        videoSrc: "/jobspy-preview.mp4",
        links: [{label: "Video", href: "/jobspy-preview.mp4"}],
        tech: ["Go", "Python", "PostgreSQL", "Next.js", "Docker"]
      },
      {
        name: "IITM Quizzes",
        href: "https://github.com/vidhanm/IITM-quizzes",
        description: "Full-stack web application for quiz attempts with LLM-generated explanations.",
        tag: "Repo",
        previewType: "placeholder",
        links: [{label: "Repo", href: "https://github.com/vidhanm/IITM-quizzes"}],
        tech: ["React", "Flask", "Go", "LLM", "TypeScript"]
      },
      {
        name: "CoinCraft",
        href: "https://coincraft-two.vercel.app/",
        description: "Teaching children financial literacy through AI-generated learning modules with gamification.",
        tag: "Live",
        previewType: "iframe",
        links: [{label: "Live", href: "https://coincraft-two.vercel.app/"}, {label: "Repo", href: "https://github.com/vidhanm/coincraft"}],
        tech: ["Vue.js", "Flask", "SQLite", "LLM", "TypeScript"]
      },
      {
        name: "Household Services App",
        href: "https://github.com/vidhanm/household-services",
        description: "Full-stack web application for on-demand household services with document verification.",
        tag: "Repo",
        previewType: "placeholder",
        links: [{label: "Repo", href: "https://github.com/vidhanm/household-services"}],
        tech: ["TypeScript", "Vue.js", "Flask", "SQLite"]
      },
      {
        name: "RL-Based Voice Agent",
        href: "https://github.com/vidhanm/RL-DDQ",
        description: "DDQ reinforcement learning agent for optimal conversation strategies using self-play.",
        tag: "Repo",
        previewType: "placeholder",
        links: [{label: "Repo", href: "https://github.com/vidhanm/RL-DDQ"}],
        tech: ["FastAPI", "Keras", "Reinforcement Learning", "NLU"]
      },
      {
        name: "ML Flashcards",
        href: "https://ml-flashcards.vercel.app/",
        description: "Interactive flashcards for machine learning concepts.",
        tag: "Learning",
        previewType: "iframe",
        links: [{label: "Live", href: "https://ml-flashcards.vercel.app/"}],
        tech: ["Education", "Flashcards", "Web App"]
      },
      {
        name: "100 Days of CUDA",
        href: "https://100daysofcuda.vercel.app/",
        description: "A learning log and showcase for CUDA practice and experiments.",
        tag: "Technical",
        previewType: "iframe",
        links: [{label: "Live", href: "https://100daysofcuda.vercel.app/"}],
        tech: ["CUDA", "Learning Log", "Experiments"]
      },
      {
        name: "Card Pick",
        href: "https://card--pick.vercel.app/cards",
        description: "Card-based browsing experience for picking and exploring cards.",
        tag: "Product",
        previewType: "iframe",
        links: [{label: "Live", href: "https://card--pick.vercel.app/cards"}],
        tech: ["Cards", "Browse", "UI"]
      },
      {
        name: "Browser Haptics",
        href: "https://browser-haptics.pages.dev/",
        description: "Experiments with tactile feedback cues and micro-interactions in the browser.",
        tag: "Live",
        previewType: "video",
        videoSrc: "/browser-haptics-preview.mp4",
        links: [{label: "Live", href: "https://browser-haptics.pages.dev/"}, {label: "Repo", href: "https://github.com/vidhanm/browser-haptics"}],
        tech: ["Web APIs", "Haptics", "Interaction"]
      }
    ];

    const tagColors = {
      Commercial: {bg: "bg-[#f27a1a]", border: "border-[#f27a1a]"},
      Video: {bg: "bg-[#ec1c5f]", border: "border-[#ec1c5f]"},
      Repo: {bg: "bg-[#2e88eb]", border: "border-[#2e88eb]"},
      Live: {bg: "bg-[#34b819]", border: "border-[#34b819]"},
      Learning: {bg: "bg-[#9d4edd]", border: "border-[#9d4edd]"},
      Technical: {bg: "bg-[#00bfff]", border: "border-[#00bfff]"},
      Product: {bg: "bg-[#ff006e]", border: "border-[#ff006e]"}
    };

    const grid = document.getElementById('projects-grid');
    projects.forEach(project => {
      const colors = tagColors[project.tag] || {bg: "bg-black", border: "border-black"};
      const previewHtml = project.previewType === "iframe" 
        ? `<iframe src="${project.href}" title="${project.name}" class="absolute inset-0 h-full w-full border-0 bg-white" loading="lazy"></iframe>`
        : project.previewType === "video"
        ? `<video class="absolute inset-0 h-full w-full object-cover" src="${project.videoSrc}" autoplay loop muted playsinline preload="metadata"></video>`
        : `<div class="absolute inset-0 flex flex-col justify-between bg-white p-6 text-black"><div><span class="border-[2px] border-black bg-black px-3 py-1 text-white text-[11px] font-semibold uppercase">Repo only</span></div><div class="border-[3px] border-black bg-white p-5 shadow-[4px_4px_0px_rgba(0,0,0,0.2)]"><p class="text-xs font-semibold uppercase tracking-[0.25em] text-black">Project snapshot</p><h4 class="mt-2 text-2xl font-black tracking-tight text-black">${project.name}</h4><p class="mt-2 max-w-md text-sm leading-6 text-black">${project.description}</p><div class="mt-4 text-sm text-gray-600">${project.tech.slice(0, 3).join(" · ")}</div></div></div>`;

      const linksHtml = project.links.map(link => `<a href="${link.href}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 border-[2px] border-black bg-black px-3 py-1.5 text-[10px] font-semibold uppercase tracking-[0.2em] text-white transition-all hover:bg-white hover:text-black">
        ${link.label}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7h10v10M7 17L17 7"/></svg>
      </a>`).join('');

      grid.innerHTML += `
        <article class="flip-card-scene" style="height: 360px;">
          <div class="flip-card-inner border-[3px] border-black shadow-[8px_8px_0px_rgba(0,0,0,0.2)] transition-shadow duration-200 hover:shadow-[12px_12px_0px_rgba(0,0,0,0.3)]">
            <div class="flip-card-front flex flex-col bg-white">
              <div class="flex items-center justify-between border-b-[3px] border-black bg-white px-4 py-3">
                <div class="flex items-center gap-2">
                  <p class="text-sm font-semibold tracking-tight text-black">${project.name}</p>
                </div>
                <div class="flex items-center gap-2">
                  <span class="${colors.border} ${colors.bg} border-[2px] px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-[0.2em] text-white">${project.tag}</span>
                </div>
              </div>
              <div class="relative flex-1 overflow-hidden border-b-[3px] border-black bg-black">
                ${previewHtml}
              </div>
            </div>
            <div class="flip-card-back flex flex-col bg-white">
              <div class="flex items-center justify-between border-b-[3px] border-black bg-white px-4 py-3">
                <p class="text-sm font-semibold tracking-tight text-black">${project.name}</p>
                <span class="${colors.border} ${colors.bg} border-[2px] px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-[0.2em] text-white">${project.tag}</span>
              </div>
              <div class="flex flex-1 flex-col justify-between overflow-auto p-5">
                <div class="space-y-5">
                  <div>
                    <p class="mb-2 text-[10px] font-semibold uppercase tracking-[0.25em] text-gray-400">About</p>
                    <p class="text-[13px] leading-6 text-black">${project.description}</p>
                  </div>
                  <div>
                    <p class="mb-2 text-[10px] font-semibold uppercase tracking-[0.25em] text-gray-400">Tech Stack</p>
                    <div class="flex flex-wrap gap-2">
                      ${project.tech.map(t => `<span class="border-[2px] border-black bg-white px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.15em] text-black">${t}</span>`).join('')}
                    </div>
                  </div>
                </div>
                <div class="mt-4 flex flex-wrap items-center gap-2 border-t-[2px] border-black pt-4">
                  ${linksHtml}
                </div>
              </div>
            </div>
          </div>
        </article>
      `;
    });

    // Flip card event listeners
    document.querySelectorAll('.flip-card-scene').forEach((scene, index) => {
      let isFlipped = false;
      scene.addEventListener('click', () => {
        isFlipped = !isFlipped;
        scene.classList.toggle('is-flipped');
      });
    });
  </script>
</body>
</html>
